server {
    listen 80;
    server_name ai-basecamp.local localhost;

    root D:/WorkSpace_dukai/AI-Basecamp/build;
    index index.html;

    access_log logs/ai-basecamp.local.access.log;
    error_log logs/ai-basecamp.local.error.log warn;

    location = /config.js { return 404; }
    location = /aws-config.js { return 404; }
    location = /aws.config.js { return 404; }

    location ~* ^/(?:\.git|\.env|\.aws|wp-|wp/|wordpress|vendor|cgi-bin|actuator|server-status|phpmyadmin|\.DS_Store) {
        return 404;
    }

    location ~* \.(?:php|bak|old|sql|env)$ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
