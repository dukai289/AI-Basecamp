# HTTP redirect to HTTPS
server {
    listen 80;
    server_name ai-basecamp.sparkhub.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ai-basecamp.sparkhub.space$request_uri;
    }
}

# HTTPS static site
server {
    listen 443 ssl http2;
    server_name ai-basecamp.sparkhub.space;

    ssl_certificate /etc/letsencrypt/live/ai-basecamp.sparkhub.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-basecamp.sparkhub.space/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /home/dukai/WorkSpace/ai-basecamp/build;
    index index.html;

    access_log /var/log/nginx/ai-basecamp.access.log;
    error_log /var/log/nginx/ai-basecamp.error.log warn;

    location = /config.js { return 404; }
    location = /aws-config.js { return 404; }
    location = /aws.config.js { return 404; }

    location ~* ^/(?:\.git|\.env|\.aws|wp-|wp/|wordpress|vendor|cgi-bin|actuator|server-status|phpmyadmin|\.DS_Store) {
        return 404;
    }

    location ~* \.(?:php|bak|old|sql|env)$ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location = /admin/report_goaccess.html {
        auth_basic "GoAccess Report";
        auth_basic_user_file /etc/nginx/.htpasswd-goaccess;

        try_files /admin/report_goaccess.html =404;
    }
}
